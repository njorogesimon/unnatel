<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apps - Unnatel Technologies</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f5f7fb;
  color: #222;
  transition: background 0.3s ease, color 0.3s ease;
}

/* HEADER (MATCH INDEX STYLE) */
header{
  background:linear-gradient(90deg,#0d1b2a,#1b263b);
  color:#fff;
  padding:20px 40px;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
  position:sticky;
  top:0;
  z-index:40;
}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

nav a{
  color:#fff;
  text-decoration:none;
  margin-left:20px;
  font-weight:500;
  transition:color .3s ease;
}

nav a:hover{
  color:#00c6ff;
}

/* TOGGLE BUTTON (MATCH INDEX) */
.toggle-btn{
  cursor:pointer;
  padding:8px 16px;
  border-radius:8px;
  border:none;
  background:linear-gradient(135deg,#2563eb,#00c6ff);
  color:#fff;
  font-weight:bold;
  transition:background .3s ease,transform .2s ease;
}

.toggle-btn:hover{
  background:linear-gradient(135deg,#1d4ed8,#0099ff);
  transform:scale(1.05);
}
